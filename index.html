<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Mode Mines Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f212e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background-color: #1a2c38;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h2 { text-align: center; color: #00e676; margin-top: 0; }
        .mode-select {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            background: #0f212e;
            padding: 10px;
            border-radius: 4px;
        }
        .mode-option { cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 14px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #b1b6bb; }
        input {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #2f4553;
            background-color: #0f212e;
            color: #fff;
            box-sizing: border-box;
            font-family: monospace;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #00e676;
            color: #0f212e;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background-color: #00c853; }
        .status-box {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            background: #243b4a;
            font-size: 13px;
            text-align: center;
            display: none;
            border-left: 4px solid #ffb300;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 25px;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }
        .tile {
            aspect-ratio: 1;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            background-color: #2f4553;
        }
        .bomb { background-color: #ff5252; color: #fff; }
        .gem { background-color: #00e676; color: #0f212e; box-shadow: 0 0 10px #00e676; }
        .unknown { background-color: #3d5a80; color: #fff; font-size: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Mines Analyzer Dashboard</h2>
    
    <div class="mode-select">
        <label class="mode-option">
            <input type="radio" name="verifyMode" value="unhashed" checked onchange="toggleInputs()"> Unhashed Mode
        </label>
        <label class="mode-option">
            <input type="radio" name="verifyMode" value="hashed" onchange="toggleInputs()"> Hashed (Active) Mode
        </label>
    </div>
    
    <div class="input-group" id="serverSeedGroup">
        <label id="seedLabel" for="serverSeed">Unhashed Server Seed</label>
        <input type="text" id="serverSeed" value="6a2686c13bde9a758fe4585b3070ab322db307db17127048ce5dd4f222db74ae">
    </div>
    
    <div class="input-group">
        <label for="clientSeed">Client Seed</label>
        <input type="text" id="clientSeed" value="CTX9QA5P91">
    </div>
    
    <div class="input-group" id="nonceGroup">
        <label for="nonce">Nonce (Bet Number)</label>
        <input type="number" id="nonce" value="1" min="1">
    </div>
    
    <button onclick="processInputData()">Run Verification Map</button>

    <div class="status-box" id="statusMessage"></div>

    <div class="grid" id="minesGrid"></div>
</div>

<script>
function toggleInputs() {
    const mode = document.querySelector('input[name="verifyMode"]:checked').value;
    const seedLabel = document.getElementById('seedLabel');
    const serverSeedInput = document.getElementById('serverSeed');
    const nonceGroup = document.getElementById('nonceGroup');
    const statusBox = document.getElementById('statusMessage');
    
    document.getElementById('minesGrid').innerHTML = '';
    statusBox.style.display = 'none';

    if (mode === 'unhashed') {
        seedLabel.innerText = "Unhashed Server Seed";
        serverSeedInput.value = "6a2686c13bde9a758fe4585b3070ab322db307db17127048ce5dd4f222db74ae";
        nonceGroup.style.display = "block";
    } else {
        seedLabel.innerText = "Hashed Server Seed (Active)";
        serverSeedInput.value = "1cc5dc49b12009a9c760523c09e35a7e00eccb411f33cacbb5420e5d38e2dcca";
        nonceGroup.style.display = "none";
    }
}

function getBoardSequence(serverSeed, clientSeed, nonce) {
    let byteSequence = [];
    let subNonce = 0;
    while (byteSequence.length < 96) {
        let message = `${clientSeed}:${nonce}:${subNonce}`;
        let hash = CryptoJS.HmacSHA256(message, serverSeed).toString(CryptoJS.enc.Hex);
        for (let i = 0; i < hash.length; i += 2) {
            byteSequence.push(parseInt(hash.substr(i, 2), 16));
        }
        subNonce++;
    }
    return byteSequence;
}

function processInputData() {
    const mode = document.querySelector('input[name="verifyMode"]:checked').value;
    const serverSeed = document.getElementById('serverSeed').value.trim();
    const clientSeed = document.getElementById('clientSeed').value.trim();
    const gridContainer = document.getElementById('minesGrid');
    const statusBox = document.getElementById('statusMessage');
    
    gridContainer.innerHTML = '';
    statusBox.style.display = 'none';

    if(!serverSeed || !clientSeed) {
        alert("Please enter the seed parameters.");
        return;
    }

    if (mode === 'hashed') {
        // HASHED MODE DISPLAY
        statusBox.innerText = "⚠️ Cryptographic Guard active. Positions are securely masked under SHA-256 and cannot be calculated ahead of time until you rotate your active seed on Stake.";
        statusBox.style.display = 'block';
        
        // Render encrypted safe layout grid
        for (let i = 0; i < 25; i++) {
            const tileDiv = document.createElement('div');
            tileDiv.classList.add('tile', 'unknown');
            tileDiv.innerText = '❓';
            gridContainer.appendChild(tileDiv);
        }
    } else {
        // UNHASHED VERIFIER ENGINE
        const nonce = parseInt(document.getElementById('nonce').value) || 1;
        let tiles = Array.from({length: 25}, (_, i) => i);
        let bombPositions = new Set();
        let bytesList = getBoardSequence(serverSeed, clientSeed, nonce);
        
        let byteIndex = 0;
        for (let i = 0; i < 24; i++) {
            let b0 = bytesList[byteIndex] / 256;
            let b1 = bytesList[byteIndex + 1] / Math.pow(256, 2);
            let b2 = bytesList[byteIndex + 2] / Math.pow(256, 3);
            let b3 = bytesList[byteIndex + 3] / Math.pow(256, 4);
            let totalFloat = b0 + b1 + b2 + b3;
            
            let remainingTiles = 25 - i;
            let chosenIndex = Math.floor(totalFloat * remainingTiles);
            let bombTile = tiles.splice(chosenIndex, 1)[0];
            bombPositions.add(bombTile);
            byteIndex += 4;
        }

        for (let i = 0; i < 25; i++) {
            const tileDiv = document.createElement('div');
            tileDiv.classList.add('tile');
            if (bombPositions.has(i)) {
                tileDiv.classList.add('bomb');
                tileDiv.innerText = '💣';
            } else {
                tileDiv.classList.add('gem');
                tileDiv.innerText = '💎';
            }
            gridContainer.appendChild(tileDiv);
        }
    }
}

window.onload = toggleInputs;
</script>

</body>
</html>
