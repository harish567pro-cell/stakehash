<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mines Provably Fair Verifier</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f212e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background-color: #1a2c38;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h2 { text-align: center; color: #00e676; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #b1b6bb; }
        input {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #2f4553;
            background-color: #0f212e;
            color: #fff;
            box-sizing: border-box;
            font-family: monospace;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #00e676;
            color: #0f212e;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover { background-color: #00c853; }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 25px;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }
        .tile {
            aspect-ratio: 1;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            transition: transform 0.1s;
        }
        .bomb { background-color: #ff5252; color: #fff; }
        .gem { background-color: #00e676; color: #0f212e; box-shadow: 0 0 10px #00e676; }
        .coord { font-size: 9px; opacity: 0.7; margin-top: 2px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Mines Grid Verifier</h2>
    
    <div class="input-group">
        <label for="serverSeed">Unhashed Server Seed</label>
        <input type="text" id="serverSeed" value="6a2686c13bde9a758fe4585b3070ab322db307db17127048ce5dd4f222db74ae">
    </div>
    
    <div class="input-group">
        <label for="clientSeed">Client Seed</label>
        <input type="text" id="clientSeed" value="CTX9QA5P91">
    </div>
    
    <div class="input-group">
        <label for="nonce">Nonce (Bet Number)</label>
        <input type="number" id="nonce" value="1" min="1">
    </div>
    
    <button onclick="verifyMinesGame()">Generate Map</button>

    <div class="grid" id="minesGrid">
        </div>
</div>

<script>
function getBoardSequence(serverSeed, clientSeed, nonce) {
    let byteSequence = [];
    let subNonce = 0;
    
    // Generates a complete pool of 96 bytes via cascading sub-nonces
    while (byteSequence.length < 96) {
        let message = `${clientSeed}:${nonce}:${subNonce}`;
        let hash = CryptoJS.HmacSHA256(message, serverSeed).toString(CryptoJS.enc.Hex);
        
        for (let i = 0; i < hash.length; i += 2) {
            byteSequence.push(parseInt(hash.substr(i, 2), 16));
        }
        subNonce++;
    }
    return byteSequence;
}

function verifyMinesGame() {
    const serverSeed = document.getElementById('serverSeed').value.trim();
    const clientSeed = document.getElementById('clientSeed').value.trim();
    const nonce = parseInt(document.getElementById('nonce').value);
    const gridContainer = document.getElementById('minesGrid');
    
    gridContainer.innerHTML = '';
    
    if(!serverSeed || !clientSeed || isNaN(nonce)) {
        alert("Please double-check all data entries before processing.");
        return;
    }

    // 1. Maintain shifting list array tracker
    let tiles = Array.from({length: 25}, (_, i) => i);
    let bombPositions = new Set();
    
    // 2. Extract sequential hash sequence values
    let bytesList = getBoardSequence(serverSeed, clientSeed, nonce);
    
    // 3. Process the exact 24-step loop simulation
    let byteIndex = 0;
    for (let i = 0; i < 24; i++) {
        let b0 = bytesList[byteIndex] / 256;
        let b1 = bytesList[byteIndex + 1] / Math.pow(256, 2);
        let b2 = bytesList[byteIndex + 2] / Math.pow(256, 3);
        let b3 = bytesList[byteIndex + 3] / Math.pow(256, 4);
        let totalFloat = b0 + b1 + b2 + b3;
        
        let remainingTiles = 25 - i;
        let chosenIndex = Math.floor(totalFloat * remainingTiles);
        
        let bombTile = tiles.splice(chosenIndex, 1)[0];
        bombPositions.add(bombTile);
        
        byteIndex += 4;
    }

    // 4. Render visually onto the 5x5 board system
    for (let i = 0; i < 25; i++) {
        const tileDiv = document.createElement('div');
        tileDiv.classList.add('tile');
        
        // Match calculation array outputs back to standard layout map indices
        let col = (i % 5) + 1;
        let row = 5 - Math.floor(i / 5);
        
        if (bombPositions.has(i)) {
            tileDiv.classList.add('bomb');
            tileDiv.innerHTML = `<span>💣</span><span class="coord">(${col},${row})</span>`;
        } else {
            tileDiv.classList.add('gem');
            tileDiv.innerHTML = `<span>💎</span><span class="coord">(${col},${row})</span>`;
        }
        
        gridContainer.appendChild(tileDiv);
    }
}

// Fire calculation layout on launch
window.onload = verifyMinesGame;
</script>

</body>
</html>
