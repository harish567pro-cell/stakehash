<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mines Provably Fair Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f212e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background-color: #1a2c38;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h2 { text-align: center; color: #00e676; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #b1b6bb; }
        input {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #2f4553;
            background-color: #0f212e;
            color: #fff;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 13px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #00e676;
            color: #0f212e;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover { background-color: #00c853; }
        .status-box {
            margin-top: 15px;
            padding: 12px;
            border-radius: 4px;
            font-size: 13px;
            text-align: center;
            display: none;
        }
        .status-success { background-color: rgba(0, 230, 118, 0.15); border-left: 4px solid #00e676; color: #00e676; }
        .status-fail { background-color: rgba(255, 179, 0, 0.15); border-left: 4px solid #ffb300; color: #ffb300; }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 25px;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }
        .tile {
            aspect-ratio: 1;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }
        .bomb { background-color: #ff5252; color: #fff; }
        .gem { background-color: #00e676; color: #0f212e; box-shadow: 0 0 10px #00e676; }
        .hidden-tile { background-color: #2f4553; color: #b1b6bb; }
    </style>
</head>
<body>

<div class="container">
    <h2>Mines Guard Tool</h2>
    
    <div class="input-group">
        <label for="clientSeed">Client Seed</label>
        <input type="text" id="clientSeed" value="" placeholder="Enter your client seed...">
    </div>

    <div class="input-group">
        <label for="hashedSeed">Hashed Server Seed</label>
        <input type="text" id="hashedSeed" value="" placeholder="Enter active hashed server seed...">
    </div>
    
    <div class="input-group">
        <label for="serverSeed">Unhashed Server Seed</label>
        <input type="text" id="serverSeed" value="" placeholder="Enter unhashed server seed...">
    </div>

    <div class="input-group">
        <label for="nonce">Nonce (Game Bet Number)</label>
        <input type="number" id="nonce" value="" placeholder="Enter nonce (e.g. 1)..." min="1">
    </div>
    
    <button onclick="verifyMinesGame()">Verify Layout Matrix</button>

    <div class="status-box" id="statusMessage"></div>

    <div class="grid" id="minesGrid">
        </div>
</div>

<script>
function getBoardSequence(serverSeed, clientSeed, nonce) {
    let byteSequence = [];
    let subNonce = 0;
    
    while (byteSequence.length < 96) {
        let message = `${clientSeed}:${nonce}:${subNonce}`;
        let hash = CryptoJS.HmacSHA256(message, serverSeed).toString(CryptoJS.enc.Hex);
        
        for (let i = 0; i < hash.length; i += 2) {
            byteSequence.push(parseInt(hash.substr(i, 2), 16));
        }
        subNonce++;
    }
    return byteSequence;
}

function verifyMinesGame() {
    const clientSeed = document.getElementById('clientSeed').value.trim();
    const hashedSeed = document.getElementById('hashedSeed').value.trim().toLowerCase();
    const serverSeed = document.getElementById('serverSeed').value.trim();
    const nonceText = document.getElementById('nonce').value.trim();
    const gridContainer = document.getElementById('minesGrid');
    const statusBox = document.getElementById('statusMessage');
    
    gridContainer.innerHTML = '';
    statusBox.style.display = 'none';
    statusBox.className = "status-box";

    // Enforce basic inputs exist
    if(!clientSeed || !hashedSeed || !nonceText) {
        alert("Please provide a Client Seed, Hashed Server Seed, and a Nonce to start.");
        return;
    }

    const nonce = parseInt(nonceText) || 1;

    // Check if Unhashed seed is entered and matches the Hash signature
    let canDecrypt = false;
    if (serverSeed) {
        let computedHash = CryptoJS.SHA256(serverSeed).toString(CryptoJS.enc.Hex).toLowerCase();
        if (computedHash === hashedSeed) {
            canDecrypt = true;
        }
    }

    if (canDecrypt) {
        // MATCH: Run 24-step drop logic
        statusBox.innerText = "✅ Seed verification successful! Unhashed seed matches Hash signature. Revealing authentic game layout.";
        statusBox.classList.add("status-success");
        statusBox.style.display = 'block';

        let tiles = Array.from({length: 25}, (_, i) => i);
        let bombPositions = new Set();
        let bytesList = getBoardSequence(serverSeed, clientSeed, nonce);
        
        let byteIndex = 0;
        for (let i = 0; i < 24; i++) {
            let b0 = bytesList[byteIndex] / 256;
            let b1 = bytesList[byteIndex + 1] / Math.pow(256, 2);
            let b2 = bytesList[byteIndex + 2] / Math.pow(256, 3);
            let b3 = bytesList[byteIndex + 3] / Math.pow(256, 4);
            let totalFloat = b0 + b1 + b2 + b3;
            
            let remainingTiles = 25 - i;
            let chosenIndex = Math.floor(totalFloat * remainingTiles);
            
            let bombTile = tiles.splice(chosenIndex, 1)[0];
            bombPositions.add(bombTile);
            byteIndex += 4;
        }

        // Display exact decrypted board map
        for (let i = 0; i < 25; i++) {
            const tileDiv = document.createElement('div');
            tileDiv.classList.add('tile');
            if (bombPositions.has(i)) {
                tileDiv.classList.add('bomb');
                tileDiv.innerText = '💣';
            } else {
                tileDiv.classList.add('gem');
                tileDiv.innerText = '💎';
            }
            gridContainer.appendChild(tileDiv);
        }

    } else {
        // BLANK OR MISMATCH: Keep grid locked with question marks
        statusBox.innerText = "⚠️ Security Guard Active. The provided unhashed seed is either missing or doesn't match the active hash. Board remains safely encrypted.";
        statusBox.classList.add("status-fail");
        statusBox.style.display = 'block';

        // Display generic safe hidden grid tiles
        for (let i = 0; i < 25; i++) {
            const tileDiv = document.createElement('div');
            tileDiv.classList.add('tile', 'hidden-tile');
            tileDiv.innerText = '❓';
            gridContainer.appendChild(tileDiv);
        }
    }
}
</script>

</body>
</html>
